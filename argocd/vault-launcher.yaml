apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://helm.releases.hashicorp.com
      chart: vault
      targetRevision: 0.28.0
      helm:
        valueFiles:
          # STRICT ROUTING: Argo CD will only pull the Azure-specific storage values
          - $values/k8s/environments/azure/vault/values.yaml
    - repoURL: 'https://https://github.com/SikiruAdebayo-SRE/Platform_Sre_Project.git'
      targetRevision: main
      ref: values
      path: k8s/vault  # <-- It tells Argo to apply "manual-ingress.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      name: vault-agent-injector-cfg
      jqPathExpressions:
        - .webhooks[].clientConfig.caBundle
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
