apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gridops-ee-pipeline
  namespace: argocd
  annotations:
    # Ensure this deploys after the K3s storage/network foundations
    argocd.argoproj.io/sync-wave: "2" 
spec:
  project: default
  source:
    repoURL: 'https://github.com/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME.git'
    targetRevision: main
    path: k8s/ee-pipeline # Path containing the Mosquitto and InfluxDB manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: telemetry
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
