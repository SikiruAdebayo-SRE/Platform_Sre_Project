auth:
  enabled: true

global:
  postgresql:
    auth:
      existingSecret: postgres-credentials

primary:
  persistence:
    size: 10Gi
    storageClass: local-path

  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi

  extraEnvVars:
    # Inject the Keycloak DB password for the creation script
    - name: KEYCLOAK_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-db-secret
          key: password
    
    # CRITICAL FIX: Inject the Admin password so 'psql' authenticates silently
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: postgres-password

  initdb:
    scripts:
      01-init-databases.sh: |
        #!/bin/bash
        set -e
        echo "Executing Sovereign Database Initialization..."

        # 1. Global Level: Create databases, the user, and assign DB ownership
        psql -v ON_ERROR_STOP=1 --username "postgres" --dbname "postgres" <<-EOSQL
            CREATE DATABASE keycloak;
            CREATE USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';
            ALTER DATABASE keycloak OWNER TO keycloak;
            
            CREATE DATABASE gridops;
            CREATE DATABASE n8n;
        EOSQL

        # 2. Database Level: Enforce strict schema ownership for Keycloak
        # Mathematically guarantees Keycloak has full authority over its schema
        psql -v ON_ERROR_STOP=1 --username "postgres" --dbname "keycloak" <<-EOSQL
            GRANT ALL ON SCHEMA public TO keycloak;
            ALTER SCHEMA public OWNER TO keycloak;
        EOSQL
