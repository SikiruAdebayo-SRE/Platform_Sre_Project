auth:
  enabled: true

global:
  postgresql:
    auth:
      existingSecret: postgres-credentials

primary:
  persistence:
    size: 10Gi
    storageClass: longhorn

  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 512Mi

  extraEnvVars:
    # Inject the Keycloak DB password for the creation script
    - name: KEYCLOAK_DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: keycloak-db-secret
          key: password
    
    # CRITICAL FIX: Inject the Admin password so 'psql' authenticates silently
    - name: PGPASSWORD
      valueFrom:
        secretKeyRef:
          name: postgres-credentials
          key: postgres-password

  initdb:
    scripts:
      01-init-databases.sh: |
        #!/bin/bash
        set -e
        echo "Executing Sovereign Database Initialization..."
        
        # psql will automatically use the $PGPASSWORD environment variable
        psql -v ON_ERROR_STOP=1 --username "postgres" --dbname "postgres" <<-EOSQL
            CREATE DATABASE keycloak;
            CREATE USER keycloak WITH PASSWORD '${KEYCLOAK_DB_PASSWORD}';
            GRANT ALL PRIVILEGES ON DATABASE keycloak TO keycloak;
            
            CREATE DATABASE gridops;
            CREATE DATABASE n8n;
        EOSQL
