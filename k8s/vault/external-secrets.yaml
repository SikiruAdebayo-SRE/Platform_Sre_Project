# ==========================================
# 1. CENTRAL DATA PLANE (n8n Namespace)
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-credentials-es
  namespace: n8n
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-credentials
  data:
    - secretKey: postgres-password
      remoteRef:
        key: postgres-credentials
        property: postgres-password
---
