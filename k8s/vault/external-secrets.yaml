apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-keycloak-vault-sync
  namespace: jenkins
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: jenkins-keycloak-secret
    creationPolicy: Owner
  data:
    - secretKey: client-secret
      remoteRef:
        key: jenkins-keycloak-secret
        property: client-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-github-vault-sync
  namespace: argocd
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # This is the K8s secret ESO will create
    name: argocd-github-org-creds
    creationPolicy: Owner
    template:
      metadata:
        labels:
          # THE CRITICAL BINDING: This label tells Argo CD to use this as an Organization Credential
          argocd.argoproj.io/secret-type: repo-creds
      data:
        # Argo CD strictly requires these keys for a repository credential template
        url: "https://github.com/JimohAdebayo-DevOps"
        type: "git"
        username: "{{ .github_user }}"
        password: "{{ .github_token }}"
  data:
    - secretKey: github_user
      remoteRef:
        key: jenkins-github-creds
        property: username
    - secretKey: github_token
      remoteRef:
        key: jenkins-github-creds
        property: token

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: mosquitto-auth-sync
  # SRE Rule: Must match the namespace where the mosquitto pod runs
  namespace: gridops-edge
spec:
  refreshInterval: "1h"
  secretStoreRef:
    # Bridges to the existing internal Vault connection
    name: vault-backend
    kind: ClusterSecretStore
  target:
    # This must match the exact secretName your Mosquitto Deployment is attempting to mount
    name: mosquitto-auth-secret
    creationPolicy: Owner
  data:
    - secretKey: passwd
      remoteRef:
        key: secret/data/mosquitto-auth-credentials
        property: passwd
