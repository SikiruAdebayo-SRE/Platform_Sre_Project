# ==========================================
# CI/CD: DOCKER HUB FOR KANIKO (jenkins Namespace)
# ==========================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dockerhub-creds-kaniko-es
  namespace: jenkins
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: dockerhub-creds-kaniko
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        # Dynamically builds the Docker config JSON using Vault data
        .dockerconfigjson: '{"auths": {"https://index.docker.io/v1/": {"auth": "{{ printf "%s:%s" .username .password | b64enc }}"}}}'
  data:
    - secretKey: username
      remoteRef:
        key: dockerhub-creds
        property: username
    - secretKey: password
      remoteRef:
        key: dockerhub-creds
        property: password
---
