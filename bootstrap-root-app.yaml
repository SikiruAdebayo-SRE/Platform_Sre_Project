apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gridops-root-application
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/SikiruAdebayo-SRE/Platform_Sre_Project.git'
    targetRevision: main
    path: argocd # Points to the folder containing all other App Launchers
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
